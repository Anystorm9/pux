name: Docker Container Monitor

on:
  push:
    branches: [ main ]
#  schedule:
#    - cron: '*/6 * * * *'  # Ejecuta cada 6 minutos

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t my-container .

    - name: Start 30 containers
      run: |
        for i in {1..30}; do
          NEW_NAME="container-$i"
          PORT_590=$((5900 + i))
          PORT_22=$((220 + i))
          docker run -d --name $NEW_NAME -p $PORT_590:5901 -p $PORT_22:22 my-container
          echo "Iniciado $NEW_NAME"
        done

    - name: Wait 2 hours
      run: |
        echo "Esperando 2 horas antes de detener los contenedores"
        sleep 7200

    - name: Stop containers
      run: |
        for i in {1..30}; do
          NEW_NAME="container-$i"
          docker stop $NEW_NAME || true
          docker rm $NEW_NAME || true
        done

    - name: Cleanup
      if: always()
      run: |
        docker system prune -f